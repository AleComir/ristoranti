<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>I Miei Ristoranti</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --wood-dark: #2a1a0a;
  --wood-mid: #3d2410;
  --wood-light: #5c3518;
  --cream: #f5ead0;
  --cream-dark: #e8d5aa;
  --gold: #c8931a;
  --gold-light: #e8b84b;
  --red-sign: #8b1a1a;
  --text-dark: #1a0e05;
  --green-old: #2d5a27;
}

body {
  background: var(--wood-dark);
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,.08) 2px, rgba(0,0,0,.08) 3px),
    repeating-linear-gradient(180deg, transparent, transparent 20px, rgba(255,255,255,.015) 20px, rgba(255,255,255,.015) 21px);
  min-height: 100vh;
  font-family: 'IM Fell English', serif;
  color: var(--cream);
  padding: 20px 16px 60px;
}

.sign-wrapper { max-width: 820px; margin: 0 auto 20px; }
.sign-outer {
  background: var(--wood-light); border-radius: 6px; padding: 6px;
  box-shadow: 0 0 0 3px #7a4a20, 0 0 0 6px #4a2a08, 0 8px 40px rgba(0,0,0,.8);
}
.sign-inner {
  background: var(--red-sign);
  background-image: radial-gradient(ellipse at 30% 30%, rgba(255,255,255,.06) 0%, transparent 60%);
  border-radius: 3px; border: 2px solid rgba(200,147,26,.4);
  padding: 24px 20px 20px; text-align: center; position: relative; overflow: hidden;
}
.sign-inner::before {
  content: ''; position: absolute; inset: 8px;
  border: 1px solid rgba(200,147,26,.25); border-radius: 2px; pointer-events: none;
}
.corner { position: absolute; font-size: 20px; color: var(--gold); opacity: .6; line-height: 1; }
.corner.tl { top: 10px; left: 12px; }
.corner.tr { top: 10px; right: 12px; transform: scaleX(-1); }
.corner.bl { bottom: 10px; left: 12px; transform: scaleY(-1); }
.corner.br { bottom: 10px; right: 12px; transform: scale(-1,-1); }
.sign-subtitle {
  font-family: 'Cinzel', serif; font-size: clamp(9px,2vw,12px);
  letter-spacing: 6px; color: var(--gold-light); opacity: .8;
  text-transform: uppercase; margin-bottom: 6px;
}
.sign-title {
  font-family: 'Cinzel Decorative', cursive; font-size: clamp(22px,6vw,46px);
  color: var(--gold-light);
  text-shadow: 0 0 20px rgba(200,147,26,.5), 2px 2px 0 rgba(0,0,0,.6);
  line-height: 1.15; letter-spacing: 2px;
}
.sign-divider {
  display: flex; align-items: center; gap: 10px;
  margin: 10px 20px; color: var(--gold); opacity: .5; font-size: 18px;
}
.sign-divider::before, .sign-divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.sync-bar {
  max-width: 820px; margin: 0 auto 14px;
  text-align: center; font-family: 'Cinzel', serif;
  font-size: 11px; letter-spacing: 1px; opacity: .75;
}
.sync-bar.online { color: #6baa7f; }
.sync-bar.offline { color: #c9923e; }

.toolbar {
  max-width: 820px; margin: 0 auto 16px;
  display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
}
.search-wrap { flex: 1; min-width: 180px; position: relative; }
.search-wrap input {
  width: 100%; background: var(--wood-mid); border: 1px solid var(--wood-light);
  border-radius: 4px; padding: 9px 14px 9px 36px; color: var(--cream);
  font-family: 'IM Fell English', serif; font-size: 14px; outline: none; transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--gold); }
.search-wrap input::placeholder { color: rgba(245,234,208,.35); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; opacity: .5; }

.btn-add {
  background: var(--green-old); color: var(--cream);
  border: 1px solid rgba(255,255,255,.15); border-radius: 4px;
  padding: 9px 18px; font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1px;
  cursor: pointer; white-space: nowrap; transition: background .2s;
  box-shadow: 0 2px 6px rgba(0,0,0,.4);
}
.btn-add:hover { background: #3a7533; }

.count-badge {
  font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 1px;
  color: var(--gold); opacity: .7; white-space: nowrap;
}

.table-frame {
  max-width: 820px; margin: 0 auto;
  background: var(--wood-light); border-radius: 4px; padding: 4px;
  box-shadow: 0 0 0 2px #4a2a08, 0 8px 30px rgba(0,0,0,.6);
}
.table-scroll { overflow-x: auto; border-radius: 2px; }

table {
  width: 100%; border-collapse: collapse;
  background: var(--cream); color: var(--text-dark);
  font-size: 14px; min-width: 520px;
}
thead tr { background: var(--wood-mid); }
th {
  font-family: 'Cinzel', serif; font-size: 10px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase; color: var(--gold-light);
  padding: 12px 14px; text-align: left;
  border-bottom: 2px solid var(--gold); white-space: nowrap;
}
th.sortable { cursor: pointer; user-select: none; transition: color .15s; }
th.sortable:hover { color: #fff; }
th.sortable::after { content: ' ⇅'; opacity: .35; font-size: 9px; }
th.sort-asc::after  { content: ' ▲'; opacity: .9; }
th.sort-desc::after { content: ' ▼'; opacity: .9; }
th:last-child { text-align: center; width: 80px; }

tbody tr { border-bottom: 1px solid var(--cream-dark); transition: background .15s; animation: fadeRow .3s ease both; }
@keyframes fadeRow { from { opacity:0; transform:translateX(-6px); } to { opacity:1; transform:translateX(0); } }
tbody tr:nth-child(even) { background: #faf3e4; }
tbody tr:hover { background: #fff8e8; }

td { padding: 11px 14px; font-family: 'IM Fell English', serif; vertical-align: middle; line-height: 1.3; }
td.nome { font-weight: 700; font-size: 15px; color: #1a0e05; }
td.localita { color: #1a0e05; }
td.telefono a { color: #1a0e05; text-decoration: none; font-size: 14px; }
td.telefono a:hover { text-decoration: underline; }
td.chiusura { font-size: 13px; color: #1a0e05; }
td.actions { text-align: center; white-space: nowrap; }

.btn-icon {
  border: none; background: none; cursor: pointer;
  font-size: 15px; padding: 4px 5px; border-radius: 3px;
  transition: background .15s; opacity: .6;
}
.btn-icon:hover { background: rgba(0,0,0,.08); opacity: 1; }
.empty-row td { text-align: center; padding: 40px; color: var(--wood-light); font-style: italic; font-size: 15px; }

.modal-bg {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(10,5,0,.8); backdrop-filter: blur(3px);
  align-items: center; justify-content: center; padding: 16px;
}
.modal-bg.open { display: flex; }
.modal-box {
  background: var(--cream); color: var(--text-dark);
  border-radius: 4px; width: 100%; max-width: 440px;
  box-shadow: 0 0 0 4px var(--wood-light), 0 0 0 7px var(--wood-mid), 0 20px 60px rgba(0,0,0,.8);
  animation: popIn .2s ease; overflow: hidden;
}
@keyframes popIn { from { transform:scale(.92); opacity:0; } to { transform:scale(1); opacity:1; } }
.modal-header {
  background: var(--red-sign); padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header h2 { font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 2px; color: var(--gold-light); }
.modal-close { background: none; border: none; cursor: pointer; color: var(--cream); font-size: 20px; opacity: .7; }
.modal-close:hover { opacity: 1; }
.modal-body { padding: 20px; }
.field { margin-bottom: 14px; }
.field label {
  display: block; font-family: 'Cinzel', serif;
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--wood-light); margin-bottom: 5px;
}
.field input {
  width: 100%; border: 1px solid var(--cream-dark); border-radius: 3px;
  padding: 9px 12px; font-family: 'IM Fell English', serif; font-size: 15px;
  color: var(--text-dark); background: #fffdf7; outline: none; transition: border-color .2s;
}
.field input:focus { border-color: var(--gold); }
.modal-footer { display: flex; gap: 10px; padding: 0 20px 20px; }
.btn-save {
  flex: 1; background: var(--green-old); color: var(--cream);
  border: none; border-radius: 3px; padding: 11px;
  font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1px;
  cursor: pointer; transition: background .2s;
}
.btn-save:hover { background: #3a7533; }
.btn-cancel-modal {
  background: var(--cream-dark); color: var(--wood-light);
  border: none; border-radius: 3px; padding: 11px 18px;
  font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1px; cursor: pointer;
}
.footer-note {
  max-width: 820px; margin: 18px auto 0; text-align: center;
  font-size: 11px; color: rgba(245,234,208,.3);
  font-family: 'Cinzel', serif; letter-spacing: 1px;
}
@media (max-width: 480px) { th.telefono, td.telefono { display: none; } }
</style>
</head>
<body>

<div class="sign-wrapper">
  <div class="sign-outer">
    <div class="sign-inner">
      <span class="corner tl">❧</span>
      <span class="corner tr">❧</span>
      <span class="corner bl">❧</span>
      <span class="corner br">❧</span>
      <div class="sign-subtitle">la mia guida personale</div>
      <div class="sign-title">I Miei Ristoranti</div>
      <div class="sign-divider">✦</div>
    </div>
  </div>
</div>

<div class="sync-bar offline" id="sync-bar">⏳ Connessione in corso…</div>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="search" id="search" placeholder="Cerca ristorante o città…" oninput="filterList(this.value)">
  </div>
  <button class="btn-add" onclick="openAdd()">+ Aggiungi</button>
  <span class="count-badge" id="count"></span>
</div>

<div class="table-frame">
  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th class="sortable sort-asc" onclick="sortBy('nome')">Ristorante</th>
          <th class="sortable" onclick="sortBy('localita')">Località</th>
          <th class="sortable telefono" onclick="sortBy('telefono')">Telefono</th>
          <th class="sortable" onclick="sortBy('chiusura')">Chiusura</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div class="footer-note">Sincronizzato in tempo reale · modificabile da tutti i dispositivi</div>

<div class="modal-bg" id="modal">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modal-title">AGGIUNGI RISTORANTE</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Nome *</label><input id="f-nome" type="text" placeholder="es. La Trattoria"></div>
      <div class="field"><label>Località</label><input id="f-localita" type="text" placeholder="es. Monza"></div>
      <div class="field"><label>Telefono</label><input id="f-telefono" type="tel" placeholder="es. 039 123456"></div>
      <div class="field"><label>Giorno di chiusura</label><input id="f-chiusura" type="text" placeholder="es. lun · lascia vuoto se sempre aperto"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel-modal" onclick="closeModal()">Annulla</button>
      <button class="btn-save" id="btn-save" onclick="save()">Salva</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWDyer9isL5t0G9r-u3e_5032YpROYMbc",
  authDomain: "ristorante-ecbfd.firebaseapp.com",
  databaseURL: "https://ristorante-ecbfd-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ristorante-ecbfd",
  storageBucket: "ristorante-ecbfd.firebasestorage.app",
  messagingSenderId: "946539174852",
  appId: "1:946539174852:web:a13b054098814ca93ba291"
};

const initialData = [
  { nome: "Camp di cent Pertigh",   localita: "Carate Brianza",  telefono: "0362 900331",   chiusura: "mar - merc" },
  { nome: "Casa Mia",               localita: "Besana Brianza",  telefono: "0362 917727",   chiusura: "" },
  { nome: "Colzani",                localita: "Cassago Brianza", telefono: "039 955188",    chiusura: "" },
  { nome: "Gravitas",               localita: "Triuggio",        telefono: "0362 151 0492", chiusura: "lun" },
  { nome: "Il Covo (enoteca)",      localita: "Osnago",          telefono: "039 928 0000",  chiusura: "mar" },
  { nome: "Il Moro",                localita: "Monza",           telefono: "039 327899",    chiusura: "lun" },
  { nome: "Isola dei Sapori",       localita: "Milano",          telefono: "02 5410 0708",  chiusura: "dom" },
  { nome: "La Corte del Carrobbio", localita: "Mariano Comense", telefono: "349 544 5464",  chiusura: "mar" },
  { nome: "La Filanda",             localita: "Macherio",        telefono: "039 201 1030",  chiusura: "lun - mar" },
  { nome: "La Pasteria",            localita: "Besana Brianza",  telefono: "340 713 7005",  chiusura: "dom" },
  { nome: "Lait Amare",             localita: "Lesmo",           telefono: "039 606 4482",  chiusura: "lun - mar - merc" },
  { nome: "Pin Del Rus",            localita: "Usmate",          telefono: "039 672020",    chiusura: "giov" },
  { nome: "Rosita",                 localita: "Besana Brianza",  telefono: "0362 995676",   chiusura: "" }
];

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const ristRef = ref(db, 'ristoranti');

let data = [];
let editingKey = null;
let currentFilter = '';
let sortKey = 'nome';
let sortDir = 1;

onValue(ristRef, (snapshot) => {
  const val = snapshot.val();
  if (!val) {
    initialData.forEach(r => push(ristRef, r));
  } else {
    data = Object.entries(val).map(([key, v]) => ({ key, ...v }));
    document.getElementById('sync-bar').textContent = '🟢 Sincronizzato in tempo reale';
    document.getElementById('sync-bar').className = 'sync-bar online';
    filterList(currentFilter);
  }
}, () => {
  document.getElementById('sync-bar').textContent = '🔴 Errore di connessione';
  document.getElementById('sync-bar').className = 'sync-bar offline';
});

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sortBy(key) {
  sortDir = (sortKey === key) ? sortDir * -1 : 1;
  sortKey = key;
  document.querySelectorAll('th.sortable').forEach(th => th.classList.remove('sort-asc','sort-desc'));
  const ths = document.querySelectorAll('th.sortable');
  const i = ['nome','localita','telefono','chiusura'].indexOf(key);
  if (ths[i]) ths[i].classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  filterList(currentFilter);
}

function render(list) {
  const tbody = document.getElementById('tbody');
  const sorted = [...list].sort((a, b) =>
    (a[sortKey]||'').toLowerCase().localeCompare((b[sortKey]||'').toLowerCase()) * sortDir
  );
  document.getElementById('count').textContent = list.length + ' ristoranti';
  if (!sorted.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Nessun ristorante trovato.</td></tr>';
    return;
  }
  tbody.innerHTML = sorted.map((r, i) => `
    <tr style="animation-delay:${i*0.03}s">
      <td class="nome">${esc(r.nome)}</td>
      <td class="localita">${esc(r.localita||'—')}</td>
      <td class="telefono">${r.telefono ? `<a href="tel:${r.telefono.replace(/\s/g,'')}">${esc(r.telefono)}</a>` : '—'}</td>
      <td class="chiusura">${r.chiusura ? esc(r.chiusura) : 'sempre aperto'}</td>
      <td class="actions">
        <button class="btn-icon" onclick="window._edit('${r.key}')">✏️</button>
        <button class="btn-icon" onclick="window._del('${r.key}')">🗑️</button>
      </td>
    </tr>`).join('');
}

window.filterList = q => {
  currentFilter = q;
  render(data.filter(r =>
    r.nome.toLowerCase().includes(q.toLowerCase()) ||
    (r.localita||'').toLowerCase().includes(q.toLowerCase())
  ));
};

window.openAdd = () => {
  editingKey = null;
  document.getElementById('modal-title').textContent = 'AGGIUNGI RISTORANTE';
  document.getElementById('btn-save').textContent = 'Aggiungi';
  ['f-nome','f-localita','f-telefono','f-chiusura'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('f-nome').focus(), 100);
};

window._edit = key => {
  const r = data.find(d => d.key === key);
  if (!r) return;
  editingKey = key;
  document.getElementById('modal-title').textContent = 'MODIFICA RISTORANTE';
  document.getElementById('btn-save').textContent = 'Salva';
  document.getElementById('f-nome').value = r.nome;
  document.getElementById('f-localita').value = r.localita || '';
  document.getElementById('f-telefono').value = r.telefono || '';
  document.getElementById('f-chiusura').value = r.chiusura || '';
  document.getElementById('modal').classList.add('open');
};

window._del = key => {
  const r = data.find(d => d.key === key);
  if (r && confirm('Eliminare "' + r.nome + '"?')) remove(ref(db, 'ristoranti/' + key));
};

window.closeModal = () => document.getElementById('modal').classList.remove('open');

window.save = () => {
  const nome = document.getElementById('f-nome').value.trim();
  if (!nome) { document.getElementById('f-nome').focus(); return; }
  const entry = {
    nome,
    localita: document.getElementById('f-localita').value.trim(),
    telefono: document.getElementById('f-telefono').value.trim(),
    chiusura: document.getElementById('f-chiusura').value.trim()
  };
  if (editingKey) {
    update(ref(db, 'ristoranti/' + editingKey), entry);
  } else {
    push(ristRef, entry);
  }
  window.closeModal();
};

window.sortBy = sortBy;

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) window.closeModal();
});
document.querySelectorAll('.field input').forEach(inp =>
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') window.save(); })
);
</script>
</body>
</html>

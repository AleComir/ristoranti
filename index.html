<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>I Miei Ristoranti</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#8b1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ristoranti">
<link rel="apple-touch-icon" href="icon-512.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&family=Playfair+Display:wght@400;600&family=EB+Garamond:wght@400;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --wood-dark: #2a1a0a;
  --wood-mid: #3d2410;
  --wood-light: #5c3518;
  --cream: #f5ead0;
  --cream-dark: #e8d5aa;
  --gold: #c8931a;
  --gold-light: #e8b84b;
  --red-sign: #8b1a1a;
  --text-dark: #1a0e05;
  --green-old: #2d5a27;
}

body {
  background: var(--wood-dark);
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,.08) 2px, rgba(0,0,0,.08) 3px),
    repeating-linear-gradient(180deg, transparent, transparent 20px, rgba(255,255,255,.015) 20px, rgba(255,255,255,.015) 21px);
  min-height: 100vh;
  font-family: 'IM Fell English', serif;
  color: var(--cream);
  padding: 20px 16px 60px;
}

/* INSEGNA */
.sign-wrapper { max-width: 820px; margin: 0 auto 20px; }
.sign-outer {
  background: var(--wood-light); border-radius: 6px; padding: 6px;
  box-shadow: 0 0 0 3px #7a4a20, 0 0 0 6px #4a2a08, 0 8px 40px rgba(0,0,0,.8);
}
.sign-inner {
  background: var(--red-sign);
  background-image: radial-gradient(ellipse at 30% 30%, rgba(255,255,255,.06) 0%, transparent 60%);
  border-radius: 3px; border: 2px solid rgba(200,147,26,.4);
  padding: 24px 20px 20px; text-align: center; position: relative; overflow: hidden;
}
.sign-inner::before {
  content: ''; position: absolute; inset: 8px;
  border: 1px solid rgba(200,147,26,.25); border-radius: 2px; pointer-events: none;
}
.corner { position: absolute; font-size: 20px; color: var(--gold); opacity: .6; line-height: 1; }
.corner.tl { top: 10px; left: 12px; }
.corner.tr { top: 10px; right: 12px; transform: scaleX(-1); }
.corner.bl { bottom: 10px; left: 12px; transform: scaleY(-1); }
.corner.br { bottom: 10px; right: 12px; transform: scale(-1,-1); }
.sign-subtitle { font-family: 'Cinzel', serif; font-size: clamp(9px,2vw,12px); letter-spacing: 6px; color: var(--gold-light); opacity: .8; text-transform: uppercase; margin-bottom: 6px; }
.sign-title { font-family: 'Cinzel Decorative', cursive; font-size: clamp(22px,6vw,46px); color: var(--gold-light); text-shadow: 0 0 20px rgba(200,147,26,.5), 2px 2px 0 rgba(0,0,0,.6); line-height: 1.15; letter-spacing: 2px; }
.sign-divider { display: flex; align-items: center; gap: 10px; margin: 10px 20px; color: var(--gold); opacity: .5; font-size: 18px; }
.sign-divider::before, .sign-divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }

.sync-bar { max-width: 820px; margin: 0 auto 14px; text-align: center; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 1px; opacity: .75; }
.sync-bar.online { color: #6baa7f; }
.sync-bar.offline { color: #c9923e; }

/* TOOLBAR */
.toolbar { max-width: 820px; margin: 0 auto 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.search-wrap { flex: 1; min-width: 180px; position: relative; }
.search-wrap input { width: 100%; background: var(--wood-mid); border: 1px solid var(--wood-light); border-radius: 4px; padding: 9px 14px 9px 36px; color: var(--cream); font-family: 'IM Fell English', serif; font-size: 14px; outline: none; transition: border-color .2s; }
.search-wrap input:focus { border-color: var(--gold); }
.search-wrap input::placeholder { color: rgba(245,234,208,.35); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; opacity: .5; }
.btn-add { background: var(--green-old); color: var(--cream); border: 1px solid rgba(255,255,255,.15); border-radius: 4px; padding: 9px 18px; font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1px; cursor: pointer; white-space: nowrap; transition: background .2s; box-shadow: 0 2px 6px rgba(0,0,0,.4); }
.btn-add:hover { background: #3a7533; }
.count-badge { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 1px; color: var(--gold); opacity: .7; white-space: nowrap; }

/* TABLE */
.table-frame { max-width: 820px; margin: 0 auto; background: var(--wood-light); border-radius: 4px; padding: 4px; box-shadow: 0 0 0 2px #4a2a08, 0 8px 30px rgba(0,0,0,.6); }
.table-scroll { overflow-x: auto; border-radius: 2px; }
table { width: 100%; border-collapse: collapse; background: var(--cream); color: var(--text-dark); font-size: 14px; min-width: 0; }
thead tr { background: var(--wood-mid); }
th { font-family: 'Cinzel', serif; font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-light); padding: 12px 14px; text-align: left; border-bottom: 2px solid var(--gold); white-space: nowrap; }
th.sortable { cursor: pointer; user-select: none; transition: color .15s; }
th.sortable:hover { color: #fff; }
th.sortable::after { content: ' ⇅'; opacity: .35; font-size: 9px; }
th.sort-asc::after { content: ' ▲'; opacity: .9; }
th.sort-desc::after { content: ' ▼'; opacity: .9; }
th:last-child { text-align: center; width: 50px; }

tbody tr { border-bottom: 1px solid var(--cream-dark); transition: background .15s; animation: fadeRow .3s ease both; }
@keyframes fadeRow { from { opacity:0; transform:translateX(-6px); } to { opacity:1; transform:translateX(0); } }
tbody tr:nth-child(even) { background: #faf3e4; }
tbody tr:hover { background: #fff8e8; }
td { padding: 11px 14px; font-family: 'EB Garamond', serif; font-size: 16px; vertical-align: middle; line-height: 1.3; }
td.nome { font-weight: 600; font-size: 17px; color: var(--red-sign); cursor: pointer; }
td.nome:hover { text-decoration: underline; }
td.localita { color: #1a0e05; }
td.chiusura { font-size: 15px; color: #1a0e05; }
td.actions { text-align: center; white-space: nowrap; }
.btn-icon { border: none; background: none; cursor: pointer; font-size: 15px; padding: 4px 5px; border-radius: 3px; transition: background .15s; opacity: .6; }
.btn-icon:hover { background: rgba(0,0,0,.08); opacity: 1; }
.empty-row td { text-align: center; padding: 40px; color: var(--wood-light); font-style: italic; font-size: 15px; }
.detail-value.phone { font-family: 'EB Garamond', serif; font-size: 18px; }

/* DETAIL PAGE */
.detail-page {
  display: none;
  position: fixed; inset: 0; z-index: 300;
  background: var(--wood-dark);
  background-image: repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,.08) 2px, rgba(0,0,0,.08) 3px);
  overflow-y: auto;
  padding: 0 0 60px;
}
.detail-page.open { display: block; }

.detail-header {
  background: var(--red-sign);
  padding: 16px 20px;
  display: flex; align-items: center; gap: 14px;
  border-bottom: 2px solid var(--gold);
  position: sticky; top: 0; z-index: 10;
}
.btn-back { background: none; border: none; color: var(--gold-light); font-size: 22px; cursor: pointer; padding: 0; line-height: 1; }
.detail-header h2 { font-family: 'Cinzel Decorative', cursive; font-size: clamp(16px,4vw,24px); color: var(--gold-light); flex: 1; }

.detail-body { max-width: 600px; margin: 0 auto; padding: 20px 16px; }

.detail-card {
  background: var(--cream); border-radius: 6px;
  border: 1px solid var(--cream-dark);
  overflow: hidden; margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.3);
}
.detail-card-title {
  background: var(--wood-mid); color: var(--gold-light);
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; padding: 8px 14px;
  border-bottom: 1px solid var(--gold);
}
.detail-row {
  display: flex; align-items: flex-start;
  padding: 12px 14px; border-bottom: 1px solid var(--cream-dark);
  gap: 12px; color: var(--text-dark);
}
.detail-row:last-child { border-bottom: none; }
.detail-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.detail-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--wood-light); margin-bottom: 3px; }
.detail-value { font-family: 'IM Fell English', serif; font-size: 15px; color: var(--text-dark); }
.detail-value a { color: var(--red-sign); text-decoration: none; }
.detail-value a:hover { text-decoration: underline; }
.detail-value.phone { font-family: 'EB Garamond', serif; font-size: 18px; }
.detail-value.notes { font-style: italic; line-height: 1.5; }

.prezzo-dots { display: flex; gap: 4px; margin-top: 4px; }
.prezzo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--cream-dark); }
.prezzo-dot.active { background: var(--gold); }

.detail-actions { display: flex; gap: 10px; margin-top: 8px; }
.btn-detail-edit { flex: 1; background: var(--green-old); color: var(--cream); border: none; border-radius: 4px; padding: 12px; font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1px; cursor: pointer; transition: background .2s; }
.btn-detail-edit:hover { background: #3a7533; }
.btn-detail-del { background: #7a1a1a; color: var(--cream); border: none; border-radius: 4px; padding: 12px 18px; font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1px; cursor: pointer; }

/* MODAL */
.modal-bg { display: none; position: fixed; inset: 0; z-index: 400; background: rgba(10,5,0,.8); backdrop-filter: blur(3px); align-items: flex-end; justify-content: center; padding: 0; }
.modal-bg.open { display: flex; }
.modal-box { background: var(--cream); color: var(--text-dark); border-radius: 16px 16px 0 0; width: 100%; max-width: 500px; box-shadow: 0 -4px 30px rgba(0,0,0,.6); animation: slideUp .25s ease; overflow: hidden; max-height: 92vh; overflow-y: auto; }
@keyframes slideUp { from { transform:translateY(40px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.modal-header { background: var(--red-sign); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; }
.modal-header h2 { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 2px; color: var(--gold-light); }
.modal-close { background: none; border: none; cursor: pointer; color: var(--cream); font-size: 20px; opacity: .7; }
.modal-close:hover { opacity: 1; }
.modal-body { padding: 16px 20px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--wood-light); margin-bottom: 4px; }
.field input, .field textarea, .field select {
  width: 100%; border: 1px solid var(--cream-dark); border-radius: 3px;
  padding: 9px 12px; font-family: 'IM Fell English', serif; font-size: 15px;
  color: var(--text-dark); background: #fffdf7; outline: none; transition: border-color .2s;
}
.field textarea { min-height: 80px; resize: vertical; }
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--gold); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-footer { display: flex; gap: 10px; padding: 0 20px 20px; }
.btn-save { flex: 1; background: var(--green-old); color: var(--cream); border: none; border-radius: 3px; padding: 12px; font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1px; cursor: pointer; transition: background .2s; }
.btn-save:hover { background: #3a7533; }
.btn-cancel-modal { background: var(--cream-dark); color: var(--wood-light); border: none; border-radius: 3px; padding: 12px 16px; font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1px; cursor: pointer; }

.footer-note { max-width: 820px; margin: 18px auto 0; text-align: center; font-size: 11px; color: rgba(245,234,208,.3); font-family: 'Cinzel', serif; letter-spacing: 1px; }

/* PASSWORD MODAL */
.pwd-overlay { display: none; position: fixed; inset: 0; z-index: 500; background: rgba(10,5,0,.95); backdrop-filter: blur(4px); align-items: center; justify-content: center; padding: 20px; }
.pwd-overlay.open { display: flex; }
.pwd-box { background: var(--cream); border-radius: 8px; width: 100%; max-width: 340px; overflow: hidden; box-shadow: 0 0 0 4px var(--wood-light), 0 0 0 7px var(--wood-mid), 0 20px 60px rgba(0,0,0,.8); animation: popIn .2s ease; }
.pwd-header { background: var(--red-sign); padding: 22px 20px 18px; text-align: center; border-bottom: 2px solid var(--gold); }
.pwd-header h2 { font-family: 'Cinzel Decorative', cursive; font-size: 18px; color: var(--gold-light); }
.pwd-header p { font-family: 'IM Fell English', serif; font-size: 13px; color: rgba(245,234,208,.7); margin-top: 6px; }
.pwd-body { padding: 24px 20px; }
.pwd-choices { display: flex; flex-direction: column; gap: 12px; }
.btn-guest { background: var(--wood-mid); color: var(--cream); border: 1px solid var(--wood-light); border-radius: 6px; padding: 14px; font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1px; cursor: pointer; transition: background .2s; }
.btn-guest:hover { background: var(--wood-light); }
.btn-owner { background: var(--green-old); color: var(--cream); border: none; border-radius: 6px; padding: 14px; font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1px; cursor: pointer; transition: background .2s; }
.btn-owner:hover { background: #3a7533; }
.pwd-divider { display: flex; align-items: center; gap: 10px; color: rgba(90,50,20,.4); font-size: 11px; font-family: 'Cinzel', serif; margin: 4px 0; }
.pwd-divider::before, .pwd-divider::after { content: ''; flex: 1; height: 1px; background: var(--cream-dark); }
.pwd-input-wrap { display: none; }
.pwd-input-wrap.open { display: block; }
.pwd-input-wrap input { width: 100%; border: 1px solid var(--cream-dark); border-radius: 4px; padding: 12px; font-family: 'EB Garamond', serif; font-size: 20px; color: var(--text-dark); background: #fffdf7; outline: none; text-align: center; letter-spacing: 6px; transition: border-color .2s; margin-bottom: 8px; }
.pwd-input-wrap input:focus { border-color: var(--gold); }
.pwd-error { color: #c0392b; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 1px; text-align: center; margin-bottom: 8px; min-height: 16px; }
.btn-pwd-confirm { width: 100%; background: var(--green-old); color: var(--cream); border: none; border-radius: 4px; padding: 11px; font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1px; cursor: pointer; transition: background .2s; }
.btn-pwd-confirm:hover { background: #3a7533; }
.btn-back-choices { background: none; border: none; color: var(--wood-light); font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 1px; cursor: pointer; margin-top: 10px; display: block; width: 100%; text-align: center; text-decoration: underline; }
.lock-hint { font-size: 11px; color: rgba(245,234,208,.4); font-family: 'Cinzel', serif; text-align: center; margin-top: 10px; cursor: pointer; }
.lock-hint:hover { color: var(--gold); }

@media (max-width: 600px) {
  td.chiusura { display: none; }
  th.ch-col { display: none; }
  td { padding: 10px 10px; font-size: 13px; }
  td.nome { font-size: 14px; }
  th { padding: 10px 10px; font-size: 9px; letter-spacing: 1px; }
  body { padding: 12px 10px 60px; }
}
</style>
</head>
<body>

<!-- LISTA -->
<div id="list-view">
  <div class="sign-wrapper">
    <div class="sign-outer">
      <div class="sign-inner">
        <span class="corner tl">❧</span><span class="corner tr">❧</span>
        <span class="corner bl">❧</span><span class="corner br">❧</span>
        <div class="sign-subtitle">la mia guida personale</div>
        <div class="sign-title">I Miei Ristoranti</div>
        <div class="sign-divider">✦</div>
      </div>
    </div>
  </div>

  <div class="sync-bar offline" id="sync-bar">⏳ Connessione in corso…</div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="search" placeholder="Cerca ristorante o città…" oninput="filterList(this.value)">
    </div>
    <button class="btn-add" onclick="openAdd()">+ Aggiungi</button>
    <span class="count-badge" id="count"></span>
  </div>

  <div class="table-frame">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th class="sortable sort-asc" onclick="sortBy('nome')">Ristorante</th>
            <th class="sortable" onclick="sortBy('localita')">Località</th>
            <th class="sortable ch-col" onclick="sortBy('chiusura')">Chiusura</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="footer-note">Sincronizzato in tempo reale · modificabile da tutti i dispositivi</div>
  <div class="lock-hint" id="lock-hint" onclick="showPwdModal()">🔒 Accedi per modificare</div>
</div>

<!-- PASSWORD MODAL -->
<div class="pwd-overlay" id="pwd-overlay">
  <div class="pwd-box">
    <div class="pwd-header">
      <h2>I Miei Ristoranti</h2>
      <p>Come vuoi accedere?</p>
    </div>
    <div class="pwd-body">
      <div class="pwd-choices" id="pwd-choices">
        <button class="btn-guest" onclick="enterAsGuest()">Entra come Ospite</button>
        <div class="pwd-divider">oppure</div>
        <button class="btn-owner" onclick="showPwdInput()">Entra come Proprietario</button>
      </div>
      <div class="pwd-input-wrap" id="pwd-input-wrap">
        <input id="pwd-input" type="password" placeholder="••••" maxlength="20"
          onkeydown="if(event.key==='Enter') checkPwd()">
        <div class="pwd-error" id="pwd-error"></div>
        <button class="btn-pwd-confirm" onclick="checkPwd()">Entra</button>
        <button class="btn-back-choices" onclick="backToChoices()">← Torna indietro</button>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL PAGE -->
<div class="detail-page" id="detail-page">
  <div class="detail-header">
    <button class="btn-back" onclick="closeDetail()">‹</button>
    <h2 id="detail-title"></h2>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modal-title">AGGIUNGI RISTORANTE</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field"><label>Nome *</label><input id="f-nome" type="text" placeholder="es. La Trattoria"></div>
        <div class="field"><label>Località</label><input id="f-localita" type="text" placeholder="es. Monza"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Telefono</label><input id="f-telefono" type="tel" placeholder="es. 039 123456"></div>
        <div class="field"><label>Chiusura</label><input id="f-chiusura" type="text" placeholder="es. lun - mar"></div>
      </div>
      <div class="field"><label>Indirizzo</label><input id="f-indirizzo" type="text" placeholder="es. Via Roma 1, Monza"></div>
      <div class="field-row">
        <div class="field"><label>Sito web (auto se vuoto)</label><input id="f-sito" type="url" placeholder="https://..."></div>
        <div class="field"><label>Link GPS (auto se vuoto)</label><input id="f-gps" type="url" placeholder="Google Maps URL"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Tipo di cucina</label><input id="f-cucina" type="text" placeholder="es. Italiana, Pesce…"></div>
        <div class="field"><label>Fascia di prezzo</label>
          <select id="f-prezzo">
            <option value="">—</option>
            <option value="1">€ Economico</option>
            <option value="2">€€ Medio</option>
            <option value="3">€€€ Importante</option>
            <option value="4">€€€€ Lusso</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Note personali</label><textarea id="f-note" placeholder="Annotazioni, piatti consigliati, parcheggio…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel-modal" onclick="closeModal()">Annulla</button>
      <button class="btn-save" id="btn-save" onclick="save()">Salva</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBWDyer9isL5t0G9r-u3e_5032YpROYMbc",
  authDomain: "ristorante-ecbfd.firebaseapp.com",
  databaseURL: "https://ristorante-ecbfd-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "ristorante-ecbfd",
  storageBucket: "ristorante-ecbfd.firebasestorage.app",
  messagingSenderId: "946539174852",
  appId: "1:946539174852:web:a13b054098814ca93ba291"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const ristRef = ref(db, 'ristoranti');

let data = [];
let editingKey = null;
let currentFilter = '';
let sortKey = 'nome';
let sortDir = 1;

onValue(ristRef, (snapshot) => {
  const val = snapshot.val();
  if (!val) return;
  data = Object.entries(val).map(([key, v]) => ({ key, ...v }));
  document.getElementById('sync-bar').textContent = '🟢 Sincronizzato in tempo reale';
  document.getElementById('sync-bar').className = 'sync-bar online';
  filterList(currentFilter);
}, () => {
  document.getElementById('sync-bar').textContent = '🔴 Errore di connessione';
  document.getElementById('sync-bar').className = 'sync-bar offline';
});

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function sortBy(key) {
  sortDir = (sortKey === key) ? sortDir * -1 : 1;
  sortKey = key;
  document.querySelectorAll('th.sortable').forEach(th => th.classList.remove('sort-asc','sort-desc'));
  const ths = document.querySelectorAll('th.sortable');
  const i = ['nome','localita','chiusura'].indexOf(key);
  if (ths[i]) ths[i].classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  filterList(currentFilter);
}

function render(list) {
  const tbody = document.getElementById('tbody');
  const sorted = [...list].sort((a,b) =>
    (a[sortKey]||'').toLowerCase().localeCompare((b[sortKey]||'').toLowerCase()) * sortDir
  );
  document.getElementById('count').textContent = list.length + ' ristoranti';
  if (!sorted.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="4">Nessun ristorante trovato.</td></tr>';
    return;
  }
  tbody.innerHTML = sorted.map((r, i) => `
    <tr style="animation-delay:${i*0.03}s">
      <td class="nome" onclick="window.openDetail('${r.key}')">${esc(r.nome)}</td>
      <td class="localita">${esc(r.localita||'—')}</td>
      <td class="chiusura ch-col">${r.chiusura ? esc(r.chiusura) : 'sempre aperto'}</td>
      <td class="actions">${isAuth ? `<button class="btn-icon" onclick="window._edit('${r.key}')">✏️</button>` : ''}</td>
    </tr>`).join('');
}

window.filterList = q => {
  currentFilter = q;
  render(data.filter(r =>
    r.nome.toLowerCase().includes(q.toLowerCase()) ||
    (r.localita||'').toLowerCase().includes(q.toLowerCase())
  ));
};

// DETAIL PAGE
window.openDetail = key => {
  const r = data.find(d => d.key === key);
  if (!r) return;
  document.getElementById('detail-title').textContent = r.nome;

  const prezzoEuro = r.prezzo ? '€'.repeat(parseInt(r.prezzo)) : null;
  const prezzoLabel = ['','Economico','Medio','Importante','Lusso'];

  let html = '';

  // Scheda principale
  html += `<div class="detail-card">
    <div class="detail-card-title">Informazioni</div>`;

  if (r.localita) html += `<div class="detail-row"><span class="detail-icon">📍</span><div><div class="detail-label">Località</div><div class="detail-value">${esc(r.localita)}</div></div></div>`;
  if (r.indirizzo) html += `<div class="detail-row"><span class="detail-icon">🗺</span><div><div class="detail-label">Indirizzo</div><div class="detail-value">${esc(r.indirizzo)}</div></div></div>`;
  if (r.telefono) html += `<div class="detail-row"><span class="detail-icon">📞</span><div><div class="detail-label">Telefono</div><div class="detail-value phone"><a href="tel:${r.telefono.replace(/\s/g,'')}">${esc(r.telefono)}</a></div></div></div>`;
  if (r.chiusura) html += `<div class="detail-row"><span class="detail-icon">🔴</span><div><div class="detail-label">Giorno di chiusura</div><div class="detail-value">${esc(r.chiusura)}</div></div></div>`;
  else html += `<div class="detail-row"><span class="detail-icon">🟢</span><div><div class="detail-label">Apertura</div><div class="detail-value">Sempre aperto</div></div></div>`;
  if (r.cucina) html += `<div class="detail-row"><span class="detail-icon">🍽</span><div><div class="detail-label">Tipo di cucina</div><div class="detail-value">${esc(r.cucina)}</div></div></div>`;
  if (r.prezzo) html += `<div class="detail-row"><span class="detail-icon">💶</span><div><div class="detail-label">Fascia di prezzo</div><div class="detail-value">${prezzoEuro} · ${prezzoLabel[parseInt(r.prezzo)]}</div></div></div>`;

  html += `</div>`;

  // Link utili
  if (r.sito || r.gps) {
    html += `<div class="detail-card"><div class="detail-card-title">Link utili</div>`;
    if (r.gps) html += `<div class="detail-row"><span class="detail-icon">🧭</span><div><div class="detail-label">Navigazione GPS</div><div class="detail-value"><a href="${esc(r.gps)}" target="_blank">Apri in Maps →</a></div></div></div>`;
    if (r.sito) {
      const isAutoSito = r.sito.includes('google.com/search');
      html += `<div class="detail-row"><span class="detail-icon">🌐</span><div><div class="detail-label">${isAutoSito ? 'Cerca online' : 'Sito web'}</div><div class="detail-value"><a href="${esc(r.sito)}" target="_blank">${isAutoSito ? 'Cerca su Google →' : esc(r.sito).replace(/^https?:\/\//,'')}</a></div></div></div>`;
    }
    html += `</div>`;
  }

  // Note
  if (r.note) {
    html += `<div class="detail-card"><div class="detail-card-title">Note personali</div>
      <div class="detail-row"><span class="detail-icon">📝</span><div><div class="detail-value notes">${esc(r.note)}</div></div></div>
    </div>`;
  }

  // Azioni
  if (isAuth) {
    html += `<div class="detail-actions">
      <button class="btn-detail-edit" onclick="window._edit('${r.key}'); window.closeDetail()">✏️ Modifica</button>
      <button class="btn-detail-del" onclick="window._del('${r.key}')">🗑️ Elimina</button>
    </div>`;
  }

  document.getElementById('detail-body').innerHTML = html;
  document.getElementById('detail-page').classList.add('open');
  document.getElementById('list-view').style.display = 'none';
};

window.closeDetail = () => {
  document.getElementById('detail-page').classList.remove('open');
  document.getElementById('list-view').style.display = '';
};

window.openAdd = () => {
  editingKey = null;
  document.getElementById('modal-title').textContent = 'AGGIUNGI RISTORANTE';
  document.getElementById('btn-save').textContent = 'Aggiungi';
  ['f-nome','f-localita','f-telefono','f-chiusura','f-indirizzo','f-sito','f-gps','f-cucina','f-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-prezzo').value = '';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('f-nome').focus(), 100);
};

window._edit = key => {
  const r = data.find(d => d.key === key);
  if (!r) return;
  editingKey = key;
  document.getElementById('modal-title').textContent = 'MODIFICA RISTORANTE';
  document.getElementById('btn-save').textContent = 'Salva';
  document.getElementById('f-nome').value = r.nome || '';
  document.getElementById('f-localita').value = r.localita || '';
  document.getElementById('f-telefono').value = r.telefono || '';
  document.getElementById('f-chiusura').value = r.chiusura || '';
  document.getElementById('f-indirizzo').value = r.indirizzo || '';
  document.getElementById('f-sito').value = r.sito || '';
  document.getElementById('f-gps').value = r.gps || '';
  document.getElementById('f-cucina').value = r.cucina || '';
  document.getElementById('f-prezzo').value = r.prezzo || '';
  document.getElementById('f-note').value = r.note || '';
  document.getElementById('modal').classList.add('open');
};

window._del = key => {
  const r = data.find(d => d.key === key);
  if (r && confirm('Eliminare "' + r.nome + '"?')) {
    remove(ref(db, 'ristoranti/' + key));
    window.closeDetail();
  }
};

window.closeModal = () => document.getElementById('modal').classList.remove('open');

window.save = () => {
  const nome = document.getElementById('f-nome').value.trim();
  if (!nome) { document.getElementById('f-nome').focus(); return; }
  const localita = document.getElementById('f-localita').value.trim();

  // Auto-genera link GPS se non inserito manualmente
  let gps = document.getElementById('f-gps').value.trim();
  if (!gps && nome) {
    const q = encodeURIComponent(nome + (localita ? ' ' + localita : ''));
    gps = 'https://www.google.com/maps/search/?api=1&query=' + q;
  }

  // Auto-genera link sito se non inserito manualmente
  let sito = document.getElementById('f-sito').value.trim();
  if (!sito && nome) {
    const q = encodeURIComponent(nome + (localita ? ' ' + localita : '') + ' ristorante');
    sito = 'https://www.google.com/search?q=' + q;
  }

  const entry = {
    nome,
    localita,
    telefono: document.getElementById('f-telefono').value.trim(),
    chiusura: document.getElementById('f-chiusura').value.trim(),
    indirizzo: document.getElementById('f-indirizzo').value.trim(),
    sito,
    gps,
    cucina: document.getElementById('f-cucina').value.trim(),
    prezzo: document.getElementById('f-prezzo').value,
    note: document.getElementById('f-note').value.trim()
  };
  if (editingKey) {
    update(ref(db, 'ristoranti/' + editingKey), entry);
  } else {
    push(ristRef, entry);
  }
  window.closeModal();
};

window.sortBy = sortBy;

// PASSWORD
const PWD = '2304';
const PWD_KEY = 'rist_auth';
let isAuth = localStorage.getItem(PWD_KEY) === 'owner';

function updateAuthUI() {
  const addBtn = document.querySelector('.btn-add');
  const lockHint = document.getElementById('lock-hint');
  if (isAuth) {
    addBtn.style.display = '';
    lockHint.style.display = 'none';
  } else {
    addBtn.style.display = 'none';
    lockHint.style.display = 'block';
  }
}

window.enterAsGuest = () => {
  localStorage.setItem(PWD_KEY, 'guest');
  isAuth = false;
  document.getElementById('pwd-overlay').classList.remove('open');
  updateAuthUI();
  filterList(currentFilter);
};

window.showPwdInput = () => {
  document.getElementById('pwd-choices').style.display = 'none';
  document.getElementById('pwd-input-wrap').classList.add('open');
  document.getElementById('pwd-error').textContent = '';
  document.getElementById('pwd-input').value = '';
  setTimeout(() => document.getElementById('pwd-input').focus(), 100);
};

window.backToChoices = () => {
  document.getElementById('pwd-choices').style.display = '';
  document.getElementById('pwd-input-wrap').classList.remove('open');
};

window.showPwdModal = () => {
  document.getElementById('pwd-choices').style.display = '';
  document.getElementById('pwd-input-wrap').classList.remove('open');
  document.getElementById('pwd-overlay').classList.add('open');
};

window.checkPwd = () => {
  const val = document.getElementById('pwd-input').value;
  if (val === PWD) {
    isAuth = true;
    localStorage.setItem(PWD_KEY, 'owner');
    document.getElementById('pwd-overlay').classList.remove('open');
    updateAuthUI();
    filterList(currentFilter);
  } else {
    document.getElementById('pwd-error').textContent = 'Password errata — riprova';
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
};

// Mostra il modal solo se non ha ancora scelto
const savedAuth = localStorage.getItem(PWD_KEY);
if (!savedAuth) {
  document.getElementById('pwd-overlay').classList.add('open');
}

updateAuthUI();

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) window.closeModal();
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
